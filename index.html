<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecoplant Tracker — Jazo Zevenaar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f2ee; --surface: #ffffff; --surface2: #f0ede8;
  --border: #e2ddd6; --border2: #ccc8c0; --text: #1a1814;
  --text2: #6b6660; --text3: #a8a39d; --accent: #2d5a27;
  --accent-light: #e8f0e6; --accent-text: #1e3d1a; --warn: #7a4a10;
  --warn-light: #fdf0e0; --danger: #8b2020; --danger-light: #fce8e8;
  --info: #1a3a5c; --info-light: #e6eef5;
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.nav-brand { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
.nav-logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.nav-logo svg { width: 16px; height: 16px; fill: white; }
.nav-sub { font-size: 12px; color: var(--text3); font-weight: 400; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab { font-size: 13px; padding: 6px 14px; border-radius: 6px; border: none; background: none; cursor: pointer; color: var(--text2); font-family: inherit; font-weight: 500; transition: all 0.15s; }
.nav-tab:hover { background: var(--surface2); color: var(--text); }
.nav-tab.active { background: var(--accent-light); color: var(--accent-text); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-add { font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); cursor: pointer; color: var(--text); font-family: inherit; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.nav-add:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent-text); }
.sync-status { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
.sync-dot.ok { background: #4caf50; }
.sync-dot.busy { background: #ff9800; animation: pulse 1s infinite; }
.sync-dot.err { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
main { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }
.view { display: none; } .view.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.metric-val { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; }
.metric-lbl { font-size: 11px; color: var(--text2); }
.metric.green .metric-val { color: var(--accent); }
.metric.amber .metric-val { color: var(--warn); }
.metric.red .metric-val { color: var(--danger); }
.metric.blue .metric-val { color: var(--info); }

/* STATUS COLORS */
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.badge.gepland { background: #f0ede8; color: #6b6660; }
.badge.in_productie { background: #fdf0e0; color: #7a4a10; }
.badge.klaar_loods { background: #e6eef5; color: #1a3a5c; }
.badge.verkocht { background: #eef0fd; color: #3a1a5c; }
.badge.transport_gepland { background: #fdf5e0; color: #6b4a10; }
.badge.onderweg { background: #fff8e0; color: #7a5a00; }
.badge.geleverd { background: #e8f5e0; color: #2a5a10; }
.badge.geplaatst { background: #e0f0e8; color: #0f5a3a; }
.badge.opgeleverd { background: var(--accent-light); color: var(--accent-text); }
.badge.geannuleerd { background: var(--danger-light); color: var(--danger); }

/* TIMELINE */
.tl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
.tl-card.urgent { border-left: 3px solid var(--danger); }
.tl-card.soon { border-left: 3px solid #e8a840; }
.tl-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.tl-title { font-size: 14px; font-weight: 600; }
.tl-meta { font-size: 12px; color: var(--text2); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.tl-tag { background: var(--surface2); border-radius: 4px; padding: 1px 6px; font-size: 11px; color: var(--text2); }
.tl-right { text-align: right; flex-shrink: 0; }
.tl-delivery { font-size: 11px; color: var(--text2); }
.tl-delivery strong { display: block; font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; }
.tl-progress { padding: 10px 16px; }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.progress-steps { display: flex; justify-content: space-between; }
.progress-step { font-size: 10px; color: var(--text3); }
.progress-step.done { color: var(--accent); font-weight: 500; }
.progress-step.active { color: var(--warn); font-weight: 500; }
.tl-accessories { padding: 6px 16px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
.acc-chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.tl-actions { padding: 0 16px 12px; }
.btn-edit { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2); background: none; cursor: pointer; color: var(--text2); font-family: inherit; font-weight: 500; }
.btn-edit:hover { background: var(--surface2); }

/* EXPORT BAR */
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 8px; flex-wrap: wrap; }
.toolbar-left { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--text2); font-family: inherit; }
.filter-btn.active { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }
.btn-export { font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); cursor: pointer; color: var(--text); font-family: inherit; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.btn-export:hover { background: var(--surface2); }

/* UNIT CARDS */
.unit-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
.unit-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; }
.unit-header:hover { background: var(--surface2); }
.unit-left { display: flex; align-items: center; gap: 12px; }
.unit-avatar { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-light); color: var(--accent-text); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; text-align: center; line-height: 1.2; }
.unit-name { font-size: 14px; font-weight: 600; }
.unit-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.unit-right { display: flex; align-items: center; gap: 10px; }
.chevron { font-size: 18px; color: var(--text3); transition: transform 0.2s; line-height: 1; }
.chevron.open { transform: rotate(90deg); }
.unit-body { display: none; border-top: 1px solid var(--border); }
.unit-body.open { display: block; }
.unit-section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
.unit-section:last-child { border-bottom: none; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 12px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.field-full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--text2); font-weight: 500; }
.field input, .field select, .field textarea { font-size: 13px; padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-family: inherit; transition: border-color 0.15s; width: 100%; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 64px; }
.payment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.pay-field { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
.pay-field label { font-size: 11px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 4px; }
.pay-field input { font-size: 13px; border: none; background: none; color: var(--text); font-family: 'DM Mono', monospace; padding: 0; width: 100%; }
.pay-field input:focus { outline: none; }

/* ACCESSORIES CHECKBOXES */
.acc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.acc-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.1s; font-size: 13px; }
.acc-item:hover { background: var(--surface2); }
.acc-item.checked { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
.acc-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; flex-shrink: 0; }

.unit-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; background: var(--surface2); }
.btn-danger { font-size: 12px; padding: 6px 12px; border: 1px solid #e0c0c0; border-radius: 6px; background: none; cursor: pointer; color: var(--danger); font-family: inherit; }
.btn-danger:hover { background: var(--danger-light); }
.btn-primary { font-size: 13px; padding: 7px 16px; border: 1px solid var(--accent); border-radius: 8px; background: var(--accent); cursor: pointer; color: white; font-family: inherit; font-weight: 500; }
.save-indicator { font-size: 11px; color: var(--text3); }
.save-indicator.saving { color: var(--warn); }
.save-indicator.saved { color: var(--accent); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius-lg); max-width: 460px; width: 100%; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { font-size: 12px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 5px; }
.modal-field input, .modal-field select { width: 100%; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; color: var(--text); background: var(--surface); }
.modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { font-size: 13px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: none; cursor: pointer; font-family: inherit; color: var(--text2); }
.loading { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty p { font-size: 14px; margin-top: 12px; }

@media (max-width: 600px) {
  nav { padding: 0 12px; }
  .nav-sub, .sync-status span { display: none; }
  .nav-tabs { gap: 0; }
  .nav-tab { padding: 6px 10px; font-size: 12px; }
  .nav-add span { display: none; }
  main { padding: 14px 10px 80px; }
  .field-grid, .field-grid.three, .acc-grid { grid-template-columns: 1fr; }
  .field-full { grid-column: 1; }
  .payment-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg viewBox="0 0 16 16"><path d="M8 1l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z"/></svg>
    </div>
    <div>
      <div>Ecoplant Tracker</div>
      <div class="nav-sub">Jazo Zevenaar</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('overview')">Overzicht</button>
    <button class="nav-tab" onclick="switchView('details')">Details</button>
  </div>
  <div class="nav-right">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>

    <button class="nav-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      <span>Toevoegen</span>
    </button>

</nav>

<main>
  <div class="view active" id="view-overview">
    <div class="metrics" id="metrics"></div>
    <div class="toolbar">
      <div class="toolbar-left" id="filter-btns"></div>
      <button class="btn-export" onclick="exportCSV()">⬇️ Export CSV</button>
    </div>
    <div id="timeline-list"><div class="loading">Gegevens laden…</div></div>
  </div>
  <div class="view" id="view-details">
    <div id="units-list"><div class="loading">Gegevens laden…</div></div>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Ecoplant toevoegen</h3>
    <p>Vul de basisgegevens in — de rest kun je daarna aanvullen.</p>
    <div class="modal-field">
      <label>Naam / nummer</label>
      <input type="text" id="modal-name" placeholder="Ecoplant 11">
    </div>
    <div class="modal-field">
      <label>Model</label>
      <select id="modal-model">
        <option value="">— kies model —</option>
        <option>Hex600</option>
        <option>IX1200</option>
        <option>Hex2000 Bifacial</option>
        <option>Hex3000</option>
        <option>Phlx5000</option>
        <option>Hex4000 Bifacial/Albedo</option>
      </select>

      <label>Status</label>

        <option value="gepland">Gepland</option>

        <option value="klaar_loods" selected>Klaar in loods</option>
        <option value="verkocht">Verkocht</option>
        <option value="transport_gepland">Transport gepland</option>
        <option value="onderweg">Onderweg</option>
        <option value="geleverd">Geleverd</option>
        <option value="geplaatst">Geplaatst</option>
        <option value="opgeleverd">Opgeleverd</option>
        <option value="geannuleerd">Geannuleerd</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-primary" onclick="confirmAdd()">Toevoegen</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rsxmrvqcndqaljaqxkzg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzeG1ydnFjbmRxYWxqYXF4a3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODk1ODksImV4cCI6MjA5NTk2NTU4OX0.ZmK-2tDx-n3rXncqGMLhNM5bM-Wk30peLCeVHtE05OU';
const HEADERS = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

const MODELS = ['Hex600','IX1200','Hex2000 Bifacial','Hex3000','Phlx5000','Hex4000 Bifacial/Albedo'];
const BATTERIES = ['LiFePo4 Green Start V2 48V','Super Eco LiFePo4 5kWh','Super Eco LiFePo4 21kWh'];
const ACCESSORIES_LIST = ['Camera','Led verlichting','Wrapping paal','Wrapping achterkant','Solo 22kW lader','Solo 7kW EV-lader','Solo 11kW EV-lader','Accu tas (IP56)'];
const FOUNDATIONS = ['Hex3000/Phlx5000 eco granulaat (~2ton)','Hex600/IX1200/Hex2000 eco granulaat (~1ton)','Eco granulaat energy base 150kWh','Eco beton XXL 1m','Eco beton S 0,5m'];
const STATUSES = {
  gepland:           { label: 'Gepland',            step: 0 },
  in_productie:      { label: 'In productie',       step: 1 },
  klaar_loods:       { label: 'Klaar in loods',     step: 2 },
  verkocht:          { label: 'Verkocht',            step: 3 },
  transport_gepland: { label: 'Transport gepland',  step: 4 },
  onderweg:          { label: 'Onderweg',            step: 5 },
  geleverd:          { label: 'Geleverd',            step: 6 },
  geplaatst:         { label: 'Geplaatst',           step: 7 },
  opgeleverd:        { label: 'Opgeleverd',          step: 8 },
  geannuleerd:       { label: 'Geannuleerd',         step: -1 },
};
const STEPS = ['Gepland','Productie','Klaar','Verkocht','Transport','Onderweg','Geleverd','Geplaatst','Opgeleverd'];

let units = [];
let saveTimers = {};
let activeFilter = 'all';

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

async function fetchUnits() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/ecoplants?order=id.asc', { headers: HEADERS });
    if (!res.ok) throw new Error(await res.text());
    units = (await res.json()).map(dbToLocal);
    setSyncStatus('ok', 'Gesynchroniseerd');
    return true;
  } catch(e) { setSyncStatus('err', 'Fout'); console.error(e); return false; }
}

function dbToLocal(r) {
  return {
    id: r.id, name: r.name||'', client: r.client||'', clientAddress: r.client_address||'',
    contractNr: r.contract_nr||'', huisstijl: r.huisstijl||'', status: r.status||'gepland',
    delivery: r.delivery||'', productionDone: r.production_done||'', transport: r.transport||'',
    placement: r.placement||'', completion: r.completion||'',
    payOrder: r.pay_order||'', payStart: r.pay_start||'',
    payDelivery: r.pay_delivery||'', payCompletion: r.pay_completion||'', notes: r.notes||'',
    model: r.model||'', batteries: r.batteries||'', accessories: r.accessories||'',
    foundation: r.foundation||'', serialNumber: r.serial_number||'', locationWarehouse: r.location_in_warehouse||''
  };
}

function localToDb(u) {
  return {
    name: u.name, client: u.client, client_address: u.clientAddress, contract_nr: u.contractNr,
    huisstijl: u.huisstijl, status: u.status, delivery: u.delivery||null,
    production_done: u.productionDone||null, transport: u.transport||null,
    placement: u.placement||null, completion: u.completion||null,
    pay_order: u.payOrder, pay_start: u.payStart, pay_delivery: u.payDelivery,
    pay_completion: u.payCompletion, notes: u.notes,
    model: u.model, batteries: u.batteries, accessories: u.accessories,
    foundation: u.foundation, serial_number: u.serialNumber, location_in_warehouse: u.locationWarehouse
  };
}

async function saveUnit(id) {
  const u = units.find(x=>x.id===id); if (!u) return;
  setSyncStatus('busy','Opslaan…'); setIndicator(id,'saving','Opslaan…');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/ecoplants?id=eq.'+id, {
      method:'PATCH', headers:{...HEADERS,'Prefer':'return=minimal'}, body:JSON.stringify(localToDb(u))
    });
    if (!res.ok) throw new Error(await res.text());
    setSyncStatus('ok','Gesynchroniseerd'); setIndicator(id,'saved','Opgeslagen ✓');
    setTimeout(()=>setIndicator(id,'',''),2000);
    renderMetrics(); renderFilterBtns();
  } catch(e) { setSyncStatus('err','Opslaan mislukt'); setIndicator(id,'',''); console.error(e); }
}

function setIndicator(id,cls,txt) {
  const el=document.getElementById('ind-'+id);
  if(el){el.className='save-indicator '+cls;el.textContent=txt;}
}

function upd(id, field, val) {
  const u=units.find(x=>x.id===id); if(!u) return;
  u[field]=val;
  clearTimeout(saveTimers[id]);
  saveTimers[id]=setTimeout(()=>saveUnit(id),800);
  setIndicator(id,'saving','Wijzigingen…');
  renderMetrics();
}

function updAcc(id, accName, checked) {
  const u=units.find(x=>x.id===id); if(!u) return;
  let accs = u.accessories ? u.accessories.split('|').filter(Boolean) : [];
  if(checked) { if(!accs.includes(accName)) accs.push(accName); }
  else { accs = accs.filter(a=>a!==accName); }
  u.accessories = accs.join('|');
  clearTimeout(saveTimers[id]);
  saveTimers[id]=setTimeout(()=>saveUnit(id),800);
  setIndicator(id,'saving','Wijzigingen…');
}

async function addUnit(name, model, client, status) {
  setSyncStatus('busy','Toevoegen…');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/ecoplants', {
      method:'POST', headers:{...HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify({name, model, client, status: status||'klaar_loods'})
    });
    if(!res.ok) throw new Error(await res.text());
    const newUnit = dbToLocal((await res.json())[0]);
    units.push(newUnit); setSyncStatus('ok','Gesynchroniseerd');
    renderMetrics(); renderFilterBtns();
    return newUnit.id;
  } catch(e) { setSyncStatus('err','Fout'); console.error(e); return null; }
}

async function deleteUnit(id) {
  setSyncStatus('busy','Verwijderen…');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/ecoplants?id=eq.'+id,{method:'DELETE',headers:HEADERS});
    if(!res.ok) throw new Error(await res.text());
    units=units.filter(u=>u.id!==id); setSyncStatus('ok','Gesynchroniseerd');
    renderUnits(); renderMetrics(); renderTimeline(); renderFilterBtns();
  } catch(e) { setSyncStatus('err','Fout'); console.error(e); }
}

function fmt(d){if(!d)return'—';const[y,m,dy]=d.split('-');return dy+'-'+m+'-'+y;}

function urgency(u) {
  if(!u.delivery||u.status==='opgeleverd'||u.status==='geannuleerd') return '';
  const days=(new Date(u.delivery)-new Date())/86400000;
  if(days<0) return 'urgent';
  if(days<=7) return 'soon';
  return '';
}

function stepProgress(status) {
  const s = STATUSES[status];
  if(!s||s.step<0) return 0;
  return Math.round((s.step / (STEPS.length-1))*100);
}

function statusBadge(s) {
  const info = STATUSES[s]||{label:s};
  return `<span class="badge ${s}">${info.label}</span>`;
}

function renderMetrics() {
  const t=units.length;
  const loods=units.filter(u=>u.status==='klaar_loods').length;
  const active=units.filter(u=>!['opgeleverd','geannuleerd','gepland'].includes(u.status)).length;
  const done=units.filter(u=>u.status==='opgeleverd').length;
  const urgent=units.filter(u=>urgency(u)==='urgent').length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-val">${t}</div><div class="metric-lbl">Totaal</div></div>
    <div class="metric blue"><div class="metric-val">${loods}</div><div class="metric-lbl">Klaar in loods</div></div>
    <div class="metric amber"><div class="metric-val">${active}</div><div class="metric-lbl">In behandeling</div></div>
    <div class="metric green"><div class="metric-val">${done}</div><div class="metric-lbl">Opgeleverd</div></div>
    <div class="metric ${urgent>0?'red':'green'}"><div class="metric-val">${urgent}</div><div class="metric-lbl">Deadline verstreken</div></div>`;
}

function renderFilterBtns() {
  const counts = {};
  units.forEach(u=>{ counts[u.status]=(counts[u.status]||0)+1; });
  const el=document.getElementById('filter-btns');
  let html=`<button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Alle (${units.length})</button>`;
  Object.entries(STATUSES).forEach(([key,info])=>{
    if(counts[key]) html+=`<button class="filter-btn ${activeFilter===key?'active':''}" onclick="setFilter('${key}')">${info.label} (${counts[key]})</button>`;
  });
  el.innerHTML=html;
}

function setFilter(f) { activeFilter=f; renderFilterBtns(); renderTimeline(); }

function renderTimeline() {
  const el=document.getElementById('timeline-list');
  const filtered = activeFilter==='all' ? units : units.filter(u=>u.status===activeFilter);
  if(!filtered.length){el.innerHTML='<div class="empty"><p>Geen Ecoplants gevonden</p></div>';return;}
  el.innerHTML=filtered.map(u=>{
    const urg=urgency(u);
    const prog=stepProgress(u.status);
    const accs=u.accessories?u.accessories.split('|').filter(Boolean):[];
    const stepsCurrent=STATUSES[u.status]?.step||0;
    const stepsHtml=STEPS.map((s,i)=>`<span class="progress-step ${i<stepsCurrent?'done':i===stepsCurrent?'active':''}">${s}</span>`).join('');
    return`<div class="tl-card ${urg}">
      <div class="tl-head">
        <div>
          <div class="tl-title">${u.name}${u.model?' <span style="font-weight:400;color:var(--text2)">— '+u.model+'</span>':''}</div>
          <div class="tl-meta">
            ${u.client?`<span>${u.client}</span>`:''}
            ${u.serialNumber?`<span class="tl-tag">S/N: ${u.serialNumber}</span>`:''}
            ${u.locationWarehouse?`<span class="tl-tag">📍 ${u.locationWarehouse}</span>`:''}
            ${u.huisstijl==='ja'?`<span class="tl-tag">🎨 Gewrapt</span>`:''}
          </div>
        </div>
        <div class="tl-right">
          ${statusBadge(u.status)}
          <div class="tl-delivery" style="margin-top:6px"><strong>${fmt(u.delivery)}</strong>leverdatum</div>
        </div>
      </div>
      <div class="tl-progress">
        <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        <div class="progress-steps">${stepsHtml}</div>
      </div>
      ${accs.length?`<div class="tl-accessories">${accs.map(a=>`<span class="acc-chip">${a}</span>`).join('')}</div>`:''}
      <div class="tl-actions"><button class="btn-edit" onclick="switchView('details');setTimeout(()=>openUnit(${u.id}),120)">✏️ Bewerken</button></div>
    </div>`;
  }).join('');
}

        <div class="unit-section">

function exportCSV() {
  const cols=['ID','Naam','Model','Serienummer','Status','Klant','Adres','Contract','Locatie loods',
    'Huisstijl','Batterij','Fundering','Accessoires','Leverdatum','Productie klaar','Transport',
    'Plaatsing','Oplevering','Bet. opdracht','Bet. productie','Bet. levering','Bet. oplevering','Notities'];
  const rows=units.map(u=>[u.id,u.name,u.model,u.serialNumber,STATUSES[u.status]?.label||u.status,
    u.client,u.clientAddress,u.contractNr,u.locationWarehouse,u.huisstijl,u.batteries,u.foundation,
    u.accessories.replace(/\|/g,'; '),u.delivery,u.productionDone,u.transport,u.placement,u.completion,
    u.payOrder,u.payStart,u.payDelivery,u.payCompletion,u.notes]
    .map(v=>'"'+(v||'').toString().replace(/"/g,'""')+'"').join(','));
  const csv=[cols.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='ecoplant-overzicht-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function toggleUnit(id){const b=document.getElementById('body-'+id),c=document.getElementById('chev-'+id);const o=b.classList.toggle('open');c.classList.toggle('open',o);c.textContent=o?'⌄':'›';}
function openUnit(id){const b=document.getElementById('body-'+id),c=document.getElementById('chev-'+id);if(!b.classList.contains('open')){b.classList.add('open');c.classList.add('open');c.textContent='⌄';}document.getElementById('card-'+id)?.scrollIntoView({behavior:'smooth',block:'start'});}
function switchView(view){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('view-'+view).classList.add('active');document.querySelectorAll('.nav-tab')[view==='overview'?0:1].classList.add('active');if(view==='overview'){renderMetrics();renderFilterBtns();renderTimeline();}if(view==='details')renderUnits();}
function openModal(){document.getElementById('modal').classList.add('open');document.getElementById('modal-name').value='Ecoplant '+(units.length+1);document.getElementById('modal-client').value='';document.getElementById('modal-model').value='';setTimeout(()=>document.getElementById('modal-name').focus(),100);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function confirmAdd(){
  const name=document.getElementById('modal-name').value.trim()||('Ecoplant '+(units.length+1));
  const model=document.getElementById('modal-model').value;
  const client=document.getElementById('modal-client').value.trim();
  const status=document.getElementById('modal-status').value;
  closeModal();
  const newId=await addUnit(name,model,client,status);
  if(newId){switchView('details');setTimeout(()=>openUnit(newId),150);}
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open'))confirmAdd();});
setInterval(async()=>{await fetchUnits();const v=document.querySelector('.view.active')?.id;if(v==='view-overview'){renderMetrics();renderFilterBtns();renderTimeline();}if(v==='view-details')renderUnits();},30000);
(async()=>{setSyncStatus('busy','Verbinden…');await fetchUnits();renderMetrics();renderFilterBtns();renderTimeline();})();
</script>
