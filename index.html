<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecoplant Tracker — Jazo Zevenaar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f2ee; --surface: #ffffff; --surface2: #f0ede8;
  --border: #e2ddd6; --border2: #ccc8c0; --text: #1a1814;
  --text2: #6b6660; --text3: #a8a39d; --accent: #2d5a27;
  --accent-light: #e8f0e6; --accent-text: #1e3d1a; --warn: #7a4a10;
  --warn-light: #fdf0e0; --danger: #8b2020; --danger-light: #fce8e8;
  --info: #1a3a5c; --info-light: #e6eef5;
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.nav-brand { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
.nav-logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.nav-logo svg { width: 16px; height: 16px; fill: white; }
.nav-sub { font-size: 12px; color: var(--text3); font-weight: 400; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab { font-size: 13px; padding: 6px 14px; border-radius: 6px; border: none; background: none; cursor: pointer; color: var(--text2); font-family: inherit; font-weight: 500; transition: all 0.15s; }
.nav-tab:hover { background: var(--surface2); color: var(--text); }
.nav-tab.active { background: var(--accent-light); color: var(--accent-text); }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-add { font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); cursor: pointer; color: var(--text); font-family: inherit; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.nav-add:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent-text); }
.sync-status { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
.sync-dot.ok { background: #4caf50; }
.sync-dot.busy { background: #ff9800; animation: pulse 1s infinite; }
.sync-dot.err { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
main { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }
.view { display: none; } .view.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.metric-val { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; }
.metric-lbl { font-size: 12px; color: var(--text2); }
.metric.green .metric-val { color: var(--accent); }
.metric.amber .metric-val { color: var(--warn); }
.metric.red .metric-val { color: var(--danger); }
.tl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
.tl-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
.tl-title { font-size: 14px; font-weight: 600; }
.tl-client { font-size: 12px; color: var(--text2); margin-top: 2px; }
.tl-delivery { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text2); text-align: right; }
.tl-delivery strong { display: block; font-size: 13px; color: var(--text); }
.tl-steps { display: flex; align-items: flex-start; padding: 16px 18px; gap: 0; }
.tl-step { display: flex; align-items: center; flex: 1; }
.tl-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.tl-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; border: 2px solid transparent; }
.tl-dot.done { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }
.tl-dot.pending { background: var(--warn-light); color: var(--warn); border-color: #e8a840; }
.tl-dot.open { background: var(--surface2); color: var(--text3); border-color: var(--border2); }
.tl-dot-lbl { font-size: 10px; color: var(--text3); white-space: nowrap; }
.tl-dot-date { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text2); }
.tl-line { flex: 1; height: 2px; background: var(--border); margin: 0 4px; position: relative; top: -16px; }
.tl-line.done { background: var(--accent); }
.tl-pay { display: flex; gap: 8px; padding: 0 18px 14px; flex-wrap: wrap; }
.pay-chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-family: 'DM Mono', monospace; }
.pay-chip.set { background: var(--info-light); border-color: #b8cfe0; color: var(--info); }
.tl-actions { padding: 0 18px 14px; }
.btn-edit { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2); background: none; cursor: pointer; color: var(--text2); font-family: inherit; font-weight: 500; }
.btn-edit:hover { background: var(--surface2); color: var(--text); }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
.badge.open { background: var(--surface2); color: var(--text2); }
.badge.progress { background: var(--warn-light); color: var(--warn); }
.badge.done { background: var(--accent-light); color: var(--accent-text); }
.unit-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); }
.unit-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; user-select: none; }
.unit-header:hover { background: var(--surface2); }
.unit-left { display: flex; align-items: center; gap: 12px; }
.unit-avatar { width: 36px; height: 36px; border-radius: 8px; background: var(--accent-light); color: var(--accent-text); font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.unit-name { font-size: 14px; font-weight: 600; }
.unit-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.unit-right { display: flex; align-items: center; gap: 10px; }
.chevron { font-size: 18px; color: var(--text3); transition: transform 0.2s; line-height: 1; }
.chevron.open { transform: rotate(90deg); }
.unit-body { display: none; border-top: 1px solid var(--border); }
.unit-body.open { display: block; }
.unit-section { padding: 16px 18px; border-bottom: 1px solid var(--border); }
.unit-section:last-child { border-bottom: none; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin-bottom: 12px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.field-full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; color: var(--text2); font-weight: 500; }
.field input, .field select, .field textarea { font-size: 13px; padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-family: inherit; transition: border-color 0.15s; width: 100%; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 64px; }
.payment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.pay-field { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
.pay-field label { font-size: 11px; color: var(--text2); font-weight: 500; display: block; margin-bottom: 4px; }
.pay-field input { font-size: 13px; border: none; background: none; color: var(--text); font-family: 'DM Mono', monospace; padding: 0; width: 100%; }
.pay-field input:focus { outline: none; }
.unit-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; background: var(--surface2); }
.btn-danger { font-size: 12px; padding: 6px 12px; border: 1px solid #e0c0c0; border-radius: 6px; background: none; cursor: pointer; color: var(--danger); font-family: inherit; }
.btn-danger:hover { background: var(--danger-light); }
.btn-primary { font-size: 13px; padding: 7px 16px; border: 1px solid var(--accent); border-radius: 8px; background: var(--accent); cursor: pointer; color: white; font-family: inherit; font-weight: 500; }
.btn-primary:hover { background: var(--accent-text); }
.save-indicator { font-size: 11px; color: var(--text3); }
.save-indicator.saving { color: var(--warn); }
.save-indicator.saved { color: var(--accent); }
.export-bar { display: flex; justify-content: flex-end; margin-bottom: 16px; }
.btn-export { font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); cursor: pointer; color: var(--text); font-family: inherit; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.btn-export:hover { background: var(--surface2); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius-lg); max-width: 440px; width: 100%; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { font-size: 12px; font-weight: 500; color: var(--text2); display: block; margin-bottom: 5px; }
.modal-field input { width: 100%; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; color: var(--text); background: var(--surface); }
.modal-field input:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { font-size: 13px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: none; cursor: pointer; font-family: inherit; color: var(--text2); }
.loading { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty p { font-size: 14px; margin-top: 12px; }
@media (max-width: 600px) {
  nav { padding: 0 12px; }
  .nav-sub, .sync-status span { display: none; }
  .nav-tabs { gap: 0; }
  .nav-tab { padding: 6px 10px; font-size: 12px; }
  .nav-add span { display: none; }
  main { padding: 14px 10px 80px; }
  .field-grid, .field-grid.three { grid-template-columns: 1fr; }
  .field-full { grid-column: 1; }
  .payment-grid { grid-template-columns: 1fr; }
  .tl-dot-lbl { display: none; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo">
      <svg viewBox="0 0 16 16"><path d="M8 1l2 4h4l-3 3 1 4-4-2-4 2 1-4-3-3h4z"/></svg>
    </div>
    <div>
      <div>Ecoplant Tracker</div>
      <div class="nav-sub">Jazo Zevenaar</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('overview')">Overzicht</button>
    <button class="nav-tab" onclick="switchView('details')">Details</button>
  </div>
  <div class="nav-right">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Verbinden…</span>
    </div>
    <button class="nav-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      <span>Toevoegen</span>
    </button>
  </div>
</nav>

<main>
  <div class="view active" id="view-overview">
    <div class="metrics" id="metrics"></div>
    <div class="export-bar">
      <button class="btn-export" onclick="exportCSV()">⬇️ Exporteer naar CSV</button>
    </div>
    <div id="timeline-list"><div class="loading">Gegevens laden…</div></div>
  </div>
  <div class="view" id="view-details">
    <div id="units-list"><div class="loading">Gegevens laden…</div></div>
  </div>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Ecoplant toevoegen</h3>
    <p>Vul de basisgegevens in. Je kunt daarna alles verder aanvullen.</p>
    <div class="modal-field">
      <label>Naam</label>
      <input type="text" id="modal-name" placeholder="Ecoplant 4">
    </div>
    <div class="modal-field">
      <label>Klantnaam</label>
      <input type="text" id="modal-client" placeholder="Bijv. Gemeente Rotterdam">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-primary" onclick="confirmAdd()">Toevoegen</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rsxmrvqcndqaljaqxkzg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzeG1ydnFjbmRxYWxqYXF4a3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzODk1ODksImV4cCI6MjA5NTk2NTU4OX0.ZmK-2tDx-n3rXncqGMLhNM5bM-Wk30peLCeVHtE05OU';
const HEADERS = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

let units = [];
let saveTimers = {};

function setSyncStatus(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-label').textContent = label;
}

async function fetchUnits() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/ecoplants?order=id.asc', { headers: HEADERS });
    if (!res.ok) throw new Error(await res.text());
    units = (await res.json()).map(dbToLocal);
    setSyncStatus('ok', 'Gesynchroniseerd');
    return true;
  } catch(e) { setSyncStatus('err', 'Fout'); console.error(e); return false; }
}

function dbToLocal(r) {
  return { id:r.id, name:r.name, client:r.client||'', clientAddress:r.client_address||'',
    contractNr:r.contract_nr||'', huisstijl:r.huisstijl||'', status:r.status||'open',
    delivery:r.delivery||'', productionDone:r.production_done||'', transport:r.transport||'',
    placement:r.placement||'', completion:r.completion||'', payOrder:r.pay_order||'',
    payStart:r.pay_start||'', payDelivery:r.pay_delivery||'', payCompletion:r.pay_completion||'',
    notes:r.notes||'' };
}

function localToDb(u) {
  return { name:u.name, client:u.client, client_address:u.clientAddress, contract_nr:u.contractNr,
    huisstijl:u.huisstijl, status:u.status, delivery:u.delivery||null,
    production_done:u.productionDone||null, transport:u.transport||null,
    placement:u.placement||null, completion:u.completion||null,
    pay_order:u.payOrder, pay_start:u.payStart, pay_delivery:u.payDelivery,
    pay_completion:u.payCompletion, notes:u.notes };
}

async function saveUnit(id) {
  const u = units.find(x => x.id===id); if (!u) return;
  setSyncStatus('busy','Opslaan…'); setIndicator(id,'saving','Opslaan…');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/ecoplants?id=eq.'+id, {
      method:'PATCH', headers:{...HEADERS,'Prefer':'return=minimal'}, body:JSON.stringify(localToDb(u))
    });
    if (!res.ok) throw new Error(await res.text());
    setSyncStatus('ok','Gesynchroniseerd'); setIndicator(id,'saved','Opgeslagen ✓');
    setTimeout(()=>setIndicator(id,'',''),2000);
  } catch(e) { setSyncStatus('err','Opslaan mislukt'); setIndicator(id,'',''); console.error(e); }
}

function setIndicator(id,cls,txt) {
  const el = document.getElementById('ind-'+id);
  if (el) { el.className='save-indicator '+cls; el.textContent=txt; }
}

function upd(id, field, val) {
  const u = units.find(x=>x.id===id); if (!u) return;
  u[field]=val;
  clearTimeout(saveTimers[id]);
  saveTimers[id]=setTimeout(()=>saveUnit(id),800);
  setIndicator(id,'saving','Wijzigingen…');
  renderMetrics();
}

async function addUnit(name, client) {
  setSyncStatus('busy','Toevoegen…');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/ecoplants', {
      method:'POST', headers:{...HEADERS,'Prefer':'return=representation'},
      body:JSON.stringify({name,client,status:'open'})
    });
    if (!res.ok) throw new Error(await res.text());
    const newUnit = dbToLocal((await res.json())[0]);
    units.push(newUnit); setSyncStatus('ok','Gesynchroniseerd'); return newUnit.id;
  } catch(e) { setSyncStatus('err','Fout'); console.error(e); return null; }
}

async function deleteUnit(id) {
  setSyncStatus('busy','Verwijderen…');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/ecoplants?id=eq.'+id, {method:'DELETE',headers:HEADERS});
    if (!res.ok) throw new Error(await res.text());
    units=units.filter(u=>u.id!==id); setSyncStatus('ok','Gesynchroniseerd');
    renderUnits(); renderMetrics(); renderTimeline();
  } catch(e) { setSyncStatus('err','Fout'); console.error(e); }
}

function exportCSV() {
  const cols = ['ID','Naam','Klant','Adres','Contract','Huisstijl','Status','Leverdatum',
    'Productie klaar','Transport','Plaatsing','Oplevering',
    'Betaling opdracht','Betaling productie','Betaling levering','Betaling oplevering','Notities'];
  const rows = units.map(u => [u.id,u.name,u.client,u.clientAddress,u.contractNr,u.huisstijl,
    u.status,u.delivery,u.productionDone,u.transport,u.placement,u.completion,
    u.payOrder,u.payStart,u.payDelivery,u.payCompletion,u.notes]
    .map(v => '"'+(v||'').replace(/"/g,'""')+'"').join(','));
  const csv = [cols.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = 'ecoplant-overzicht-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function fmt(d) { if(!d)return'—'; const[y,m,dy]=d.split('-'); return dy+'-'+m+'-'+y; }
function stepState(date) { if(!date)return'open'; return new Date(date)<new Date()?'done':'pending'; }
function statusBadge(s) {
  const l={open:'Open',progress:'In productie',done:'Opgeleverd'};
  return `<span class="badge ${s}">${l[s]||s}</span>`;
}

function renderMetrics() {
  const t=units.length, o=units.filter(u=>u.status!=='done').length,
    d=units.filter(u=>u.status==='done').length, n=units.filter(u=>!u.delivery).length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-val">${t}</div><div class="metric-lbl">Ecoplants totaal</div></div>
    <div class="metric amber"><div class="metric-val">${o}</div><div class="metric-lbl">In behandeling</div></div>
    <div class="metric green"><div class="metric-val">${d}</div><div class="metric-lbl">Opgeleverd</div></div>
    <div class="metric ${n>0?'red':'green'}"><div class="metric-val">${n}</div><div class="metric-lbl">Zonder leverdatum</div></div>`;
}

function renderTimeline() {
  const el=document.getElementById('timeline-list');
  if(!units.length){el.innerHTML='<div class="empty"><p>Voeg een Ecoplant toe om te beginnen</p></div>';return;}
  el.innerHTML=units.map(u=>{
    const steps=[{lbl:'Productie',date:u.productionDone},{lbl:'Transport',date:u.transport},
      {lbl:'Plaatsing',date:u.placement},{lbl:'Oplevering',date:u.completion}];
    const sh=steps.map((s,i)=>{const st=stepState(s.date);return`<div class="tl-step">
      <div class="tl-node"><div class="tl-dot ${st}">${i+1}</div>
      <div class="tl-dot-lbl">${s.lbl}</div><div class="tl-dot-date">${fmt(s.date)}</div></div>
      ${i<3?`<div class="tl-line ${st==='done'?'done':''}"></div>`:''}</div>`;}).join('');
    const pays=[{lbl:'Opdracht',val:u.payOrder},{lbl:'Productie',val:u.payStart},
      {lbl:'Levering',val:u.payDelivery},{lbl:'Oplevering',val:u.payCompletion}];
    return`<div class="tl-card"><div class="tl-head"><div>
      <div class="tl-title">${u.name}</div>
      <div class="tl-client">${u.client||'Klant niet ingevuld'}${u.huisstijl==='ja'?' · Gewrapt':''}</div></div>
      <div style="text-align:right">${statusBadge(u.status)}
      <div class="tl-delivery" style="margin-top:6px"><strong>${fmt(u.delivery)}</strong>leverdatum</div></div></div>
      <div class="tl-steps">${sh}</div>
      <div class="tl-pay">${pays.map(p=>`<span class="pay-chip ${p.val?'set':''}">${p.lbl}: ${p.val||'—'}</span>`).join('')}</div>
      <div class="tl-actions"><button class="btn-edit" onclick="switchView('details');setTimeout(()=>openUnit(${u.id}),120)">✏️ Bewerken</button></div>
    </div>`;}).join('');
}

function renderUnits() {
  const el=document.getElementById('units-list');
  if(!units.length){el.innerHTML='<div class="empty"><p>Nog geen Ecoplants toegevoegd</p></div>';return;}
  el.innerHTML=units.map(u=>`
    <div class="unit-card" id="card-${u.id}">
      <div class="unit-header" onclick="toggleUnit(${u.id})">
        <div class="unit-left">
          <div class="unit-avatar">${u.id}</div>
          <div><div class="unit-name">${esc(u.name)}</div>
          <div class="unit-sub">${esc(u.client)||'Klant nog niet ingevuld'}${u.delivery?' · '+fmt(u.delivery):''}</div></div>
        </div>
        <div class="unit-right">${statusBadge(u.status)}<span class="chevron" id="chev-${u.id}">›</span></div>
      </div>
      <div class="unit-body" id="body-${u.id}">
        <div class="unit-section"><div class="section-title">Klantgegevens</div>
          <div class="field-grid">
            <div class="field"><label>Naam Ecoplant</label><input type="text" value="${esc(u.name)}" oninput="upd(${u.id},'name',this.value)"></div>
            <div class="field"><label>Klantnaam</label><input type="text" value="${esc(u.client)}" oninput="upd(${u.id},'client',this.value)" placeholder="Klant of project"></div>
            <div class="field field-full"><label>Afleveradres</label><input type="text" value="${esc(u.clientAddress)}" oninput="upd(${u.id},'clientAddress',this.value)" placeholder="Straat, postcode, woonplaats"></div>
            <div class="field"><label>Contractnummer</label><input type="text" value="${esc(u.contractNr)}" oninput="upd(${u.id},'contractNr',this.value)" placeholder="EC-2026-001"></div>
            <div class="field"><label>Huisstijl gewrapt?</label><select onchange="upd(${u.id},'huisstijl',this.value)">
              <option value="" ${!u.huisstijl?'selected':''}>— selecteer —</option>
              <option value="nee" ${u.huisstijl==='nee'?'selected':''}>Nee</option>
              <option value="ja" ${u.huisstijl==='ja'?'selected':''}>Ja</option></select></div>
            <div class="field"><label>Status</label><select onchange="upd(${u.id},'status',this.value)">
              <option value="open" ${u.status==='open'?'selected':''}>Open</option>
              <option value="progress" ${u.status==='progress'?'selected':''}>In productie</option>
              <option value="done" ${u.status==='done'?'selected':''}>Opgeleverd</option></select></div>
          </div></div>
        <div class="unit-section"><div class="section-title">Leverschema</div>
          <div class="field-grid three">
            <div class="field"><label>Gewenste leverdatum</label><input type="date" value="${u.delivery}" oninput="upd(${u.id},'delivery',this.value)"></div>
            <div class="field"><label>Productie klaar</label><input type="date" value="${u.productionDone}" oninput="upd(${u.id},'productionDone',this.value)"></div>
            <div class="field"><label>Transport</label><input type="date" value="${u.transport}" oninput="upd(${u.id},'transport',this.value)"></div>
            <div class="field"><label>Plaatsing</label><input type="date" value="${u.placement}" oninput="upd(${u.id},'placement',this.value)"></div>
            <div class="field"><label>Oplevering</label><input type="date" value="${u.completion}" oninput="upd(${u.id},'completion',this.value)"></div>
          </div></div>
        <div class="unit-section"><div class="section-title">Betalingsmomenten</div>
          <div class="payment-grid">
            <div class="pay-field"><label>Bij opdracht</label><input type="text" value="${esc(u.payOrder)}" oninput="upd(${u.id},'payOrder',this.value)" placeholder="€ bedrag — datum"></div>
            <div class="pay-field"><label>Bij start productie</label><input type="text" value="${esc(u.payStart)}" oninput="upd(${u.id},'payStart',this.value)" placeholder="€ bedrag — datum"></div>
            <div class="pay-field"><label>Bij levering</label><input type="text" value="${esc(u.payDelivery)}" oninput="upd(${u.id},'payDelivery',this.value)" placeholder="€ bedrag — datum"></div>
            <div class="pay-field"><label>Bij oplevering</label><input type="text" value="${esc(u.payCompletion)}" oninput="upd(${u.id},'payCompletion',this.value)" placeholder="€ bedrag — datum"></div>
          </div></div>
        <div class="unit-section"><div class="section-title">Notities</div>
          <div class="field"><textarea oninput="upd(${u.id},'notes',this.value)" placeholder="Bijzonderheden, afspraken, aandachtspunten…">${esc(u.notes)}</textarea></div></div>
        <div class="unit-footer">
          <button class="btn-danger" onclick="if(confirm('Verwijderen?'))deleteUnit(${u.id})">🗑 Verwijderen</button>
          <span class="save-indicator" id="ind-${u.id}"></span>
        </div>
      </div>
    </div>`).join('');
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function toggleUnit(id){const b=document.getElementById('body-'+id),c=document.getElementById('chev-'+id);const o=b.classList.toggle('open');c.classList.toggle('open',o);c.textContent=o?'⌄':'›';}
function openUnit(id){const b=document.getElementById('body-'+id),c=document.getElementById('chev-'+id);if(!b.classList.contains('open')){b.classList.add('open');c.classList.add('open');c.textContent='⌄';}document.getElementById('card-'+id)?.scrollIntoView({behavior:'smooth',block:'start'});}
function switchView(view){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('view-'+view).classList.add('active');document.querySelectorAll('.nav-tab')[view==='overview'?0:1].classList.add('active');if(view==='overview'){renderMetrics();renderTimeline();}if(view==='details')renderUnits();}
function openModal(){document.getElementById('modal').classList.add('open');document.getElementById('modal-name').value='Ecoplant '+(units.length+1);document.getElementById('modal-client').value='';setTimeout(()=>document.getElementById('modal-name').focus(),100);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
async function confirmAdd(){const name=document.getElementById('modal-name').value.trim()||('Ecoplant '+(units.length+1));const client=document.getElementById('modal-client').value.trim();closeModal();const newId=await addUnit(name,client);if(newId){switchView('details');setTimeout(()=>openUnit(newId),150);}}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open'))confirmAdd();});
setInterval(async()=>{await fetchUnits();const v=document.querySelector('.view.active')?.id;if(v==='view-overview'){renderMetrics();renderTimeline();}if(v==='view-details')renderUnits();},30000);
(async()=>{setSyncStatus('busy','Verbinden…');await fetchUnits();renderMetrics();renderTimeline();})();
</script>
</body>
</html>
